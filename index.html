<!DOCTYPE html>
<html>
  <head>
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <main>
      <h1>Budget Tracker</h1>

      <!-- Summary -->
      <section>
        <h2>Summary</h2>
        <p>Income: $<span id="income-total">0</span></p>
        <p>Expenses: $<span id="expense-total">0</span></p>
        <p>Balance: $<span id="balance">0</span></p>
      </section>

      <!-- Add Income -->
      <section>
        <h2>Add Income</h2>
        <input id="income-input" type="number" placeholder="Enter income">
        <button id="add-income">Add Income</button>
      </section>

      <!-- Add Expense -->
      <section>
        <h2>Add Expense</h2>
        <input id="expense-name" type="text" placeholder="Expense name">
        <input id="expense-input" type="number" placeholder="Amount">
        <button id="add-expense">Add Expense</button>

        <h3>Expenses</h3>
        <ul id="expense-list"></ul>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
